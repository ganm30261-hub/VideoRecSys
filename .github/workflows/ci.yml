name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest black flake8

      - name: Code style check (black)
        run: black --check pipeline/ models/ serving/ experiment/ monitoring/
        continue-on-error: true

      - name: Lint (flake8)
        run: flake8 pipeline/ models/ --max-line-length=100 --ignore=E501,W503
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Verify notebook structure
        run: |
          python -c "
          import json, os, glob
          notebooks = glob.glob('notebooks/*.ipynb')
          for nb_path in notebooks:
              with open(nb_path) as f:
                  nb = json.load(f)
              print(f'✅ {nb_path}: {len(nb[\"cells\"])} cells')
          "
